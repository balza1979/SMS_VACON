name: Genera elenco file

on:
  push:
    paths:
      - 'pdf/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Genera elenco file (PDF + immagini + video)
      run: |
        echo "{" > elenco.json
        firstFolder=true

        # Estensioni supportate
        extensions=("pdf" "jpg" "jpeg" "png" "gif" "webp" "svg" "mp4" "webm" "mov")

        for folder in pdf/*; do
          if [ -d "$folder" ]; then
            folderName=$(basename "$folder")

            if [ "$firstFolder" = true ]; then
              firstFolder=false
            else
              echo "," >> elenco.json
            fi

            echo -n "  \"${folderName}\": [" >> elenco.json

            firstFile=true

            # Cerca file con tutte le estensioni
            for ext in "${extensions[@]}"; do
              for file in "$folder"/*.$ext; do
                if [ -f "$file" ]; then
                  fileName=$(basename "$file")

                  if [ "$firstFile" = true ]; then
                    firstFile=false
                  else
                    echo -n ", " >> elenco.json
                  fi

                  echo -n "\"${fileName}\"" >> elenco.json
                fi
              done
            done

            echo -n "]" >> elenco.json
          fi
        done

        echo "" >> elenco.json
        echo "}" >> elenco.json

    - name: Commit file elenco.json
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add elenco.json
        git commit -m "Aggiornato elenco file" || echo "Nessuna modifica"
        git push
