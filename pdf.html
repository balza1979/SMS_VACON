<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>File della Cartella</title>

<style>
/* ------------------ LAYOUT A DUE SEZIONI ------------------ */
body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: Arial;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ------------------ BLOCCO ALTO (max 50% schermo) ------------------ */
#big-gallery {
  flex: 0 0 auto;
  max-height: 30vh;
  overflow: hidden;
  background: black;
  padding: 10px 0;
  border-bottom: 2px solid #222;
}

/* ------------------ BLOCCO BASSO (scrollabile) ------------------ */
#pdf-container {
  flex: 1 1 auto;
  overflow-y: auto;
  padding: 20px;
}

/* ------------------ SPACER FINALE ANDROID ------------------ */
#bottom-spacer {
  height: 120px;
  width: 100%;
  background: black;
}

/* ------------------ TITOLO ------------------ */
h1 {
  text-align: center;
  color: red;
  font-size: 26px;
  margin: 10px 0 15px 0;
}

/* ------------------ TORNA INDIETRO ------------------ */
.back-button {
    position: fixed;
    top: 15px;
    right: 15px;
    background-color: #0275d8;
    color: white;
    padding: 20px 28px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    font-size: 26px;
    z-index: 999;
}

/* ------------------ VIEWER ------------------ */
#viewer-container {
  width: 100%;
  max-width: 1100px;
  margin: 0 auto;
  height: calc(30vh - 180px);
  display: flex;
  justify-content: center;
  align-items: center;
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
}

#big-image,
#big-video {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
  display: none;
}

/* ------------------ FULLSCREEN BUTTON ------------------ */
#fullscreen-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 42px;
  cursor: pointer;
  z-index: 20;
}

/* ------------------ MUTE ICON ------------------ */
#mute-btn {
  font-size: 38px;
  cursor: pointer;
  margin-top: 5px;
  display: none;
  text-align: right;
  padding-right: 20px;
}

/* ------------------ FRECCE + PLAY (L4) ------------------ */
#command-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 60px;
  margin-top: 5px;
  font-size: 60px;
}

#command-row span {
  user-select: none;
  cursor: pointer;
}

#slideshow-btn {
  font-size: 80px;
  cursor: pointer;
  margin: 0;
}

/* ------------------ INDICATORE ------------------ */
#counter {
  margin-top: 5px;
  font-size: 20px;
  color: #ccc;
}

/* ------------------ SLIDER VELOCITÀ ------------------ */
#speed-control {
  margin-top: 5px;
  width: 50%;
}

/* ------------------ CARD ------------------ */
.card {
  background: #444;
  padding: 20px;
  margin: 15px auto;
  max-width: 850px;
  border-radius: 10px;
  display: flex;
  font-size: 35px;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
}

.preview {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: 8px;
  border: 2px solid black;
  background: white;
  cursor: pointer;
}

.button-column {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

/* ------------------ PULSANTI VERDI ------------------ */
.card button {
  background: green;
  color: white;
  border: none;
  padding: 16px 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 20px;
  font-weight: 700;
  width: 220px;
}

.card button:hover {
  background: #0a0;
}

/* ------------------ LOADER POPUP ORIGINALE ------------------ */
#loadingPopup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px 50px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
  font-size: 28px;
  font-weight: bold;
  display: none;
  z-index: 2000;
  text-align: center;
  color: black;
}

#loadingPopup span {
  display: block;
  margin-top: 15px;
  font-size: 22px;
  font-weight: normal;
  color: black;
}

/* Iframe invisibile */
#testFrame {
  display: none;
}
</style>
</head>

<body>

<a class="back-button" href="index.html">⬅ Torna Indietro</a>

<h1 id="titolo"></h1>

<!-- ------------------ BLOCCO ALTO ------------------ -->
<div id="big-gallery">

    <div id="viewer-container">
        <div id="fullscreen-btn">⛶</div>
        <img id="big-image" src="">
        <video id="big-video" controls muted></video>
    </div>

    <div id="mute-btn">🔇</div>

    <div id="command-row">
        <span id="prev-btn">⬅️</span>
        <span id="slideshow-btn">▶️</span>
        <span id="next-btn">➡️</span>
    </div>

    <input id="speed-control" type="range" min="1" max="8" value="2">

    <div id="counter">0 / 0</div>
</div>

<!-- ------------------ BLOCCO BASSO ------------------ -->
<div id="pdf-container"></div>
<div id="bottom-spacer"></div>

<!-- POPUP CARICAMENTO -->
<div id="loadingPopup">
  ⏳ Caricamento del documento...
  <span id="loadingSub">Attendere qualche secondo</span>
</div>

<!-- IFRAME INVISIBILE -->
<iframe id="testFrame"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
const cartella = params.get("cartella");

document.getElementById("titolo").innerHTML =
    "File in: " + cartella + "<br>Galleria + PDF/Immagini/Video";

let gallery = [];
let currentIndex = 0;
let firstImageIndex = 0;

/* ---------------------------------------------------------
   🔥 APERTURA VELOCE (PDF, IMMAGINI, VIDEO)
--------------------------------------------------------- */
function openFast(url) {
  window.open(url, "_blank");
}

/* ---------------------------------------------------------
   🔥 APERTURA SICURA PDF (LOGICA ORIGINALE)
--------------------------------------------------------- */
function openSafe(directUrl, gviewUrl) {
  const base = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "/");
  const newTab = window.open(base + "loading.html", "_blank");

  if (!newTab) return;

  showLoading(true, "Caricamento del documento...", "Attendere qualche secondo");

  const frame = document.getElementById("testFrame");
  frame.src = directUrl;

  setTimeout(() => {
    let loaded = false;

    try {
      loaded = frame.contentWindow.location.href !== "about:blank";
    } catch (e) {
      loaded = false;
    }

    showLoading(false);

    if (loaded) {
      newTab.location.href = directUrl;
    } else {
      newTab.location.href = gviewUrl;
    }

  }, 5000);
}

/* ---------------------------------------------------------
   🔥 POPUP CARICAMENTO
--------------------------------------------------------- */
function showLoading(show, title = "", subtitle = "") {
  const popup = document.getElementById("loadingPopup");
  const sub = document.getElementById("loadingSub");

  popup.style.display = show ? "block" : "none";
  if (title) popup.childNodes[0].textContent = "⏳ " + title;
  if (subtitle) sub.textContent = subtitle;
}

/* ---------------------------------------------------------
   🔥 CARICAMENTO FILES
--------------------------------------------------------- */
fetch("elenco.json")
  .then(r => r.json())
  .then(data => {
    const files = data[cartella];
    const container = document.getElementById("pdf-container");

    const imageExt = [".jpg", ".jpeg", ".png", ".gif", ".webp"];
    let videoFound = null;

    files.forEach(file => {
      const encodedName = encodeURIComponent(file);
      const encodedFolder = encodeURIComponent(cartella);

      const base = window.location.origin + window.location.pathname.replace(/\/[^/]*$/, "/");
      const directUrl = `${base}pdf/${encodedFolder}/${encodedName}`;
      const gviewUrl = `https://docs.google.com/gview?embedded=1&url=${directUrl}`;

      const isPdf = file.toLowerCase().endsWith(".pdf");
      const isImage = imageExt.some(ext => file.toLowerCase().endsWith(ext));
      const isVideo = file.toLowerCase().endsWith(".mp4");

      if (isVideo) videoFound = { type: "video", url: directUrl };
      if (isImage) gallery.push({ type: "image", url: directUrl });

      const card = document.createElement("div");
      card.className = "card";

      let previewHtml = "";
      if (isImage)
        previewHtml = `<img class="preview" src="${directUrl}" onclick="openFast('${directUrl}')">`;
      else if (isVideo)
        previewHtml = `<img class="preview" src="https://upload.wikimedia.org/wikipedia/commons/7/75/Video_icon.png">`;
      else
        previewHtml = `<img class="preview" src="https://upload.wikimedia.org/wikipedia/commons/8/87/PDF_file_icon.svg">`;

      /* ------------------ PULSANTI ------------------ */
      let buttons = "";

      if (isImage) {
        buttons = `<button onclick="openFast('${directUrl}')">Apri Immagine</button>`;
      }
      else if (isPdf) {
        buttons = `
          <button onclick="openFast('${directUrl}')">Apri / Scarica</button>
          <button onclick="openSafe('${directUrl}', '${gviewUrl}')">Vedi Online</button>
        `;
      }
      else if (isVideo) {
        buttons = `<button onclick="openFast('${directUrl}')">Apri</button>`;
      }

      card.innerHTML = `
        ${previewHtml}
        <div class="card-title">${file}</div>
        <div class="button-column">${buttons}</div>
      `;

      container.appendChild(card);
    });

    if (videoFound) gallery.unshift(videoFound);

    firstImageIndex = (gallery[0].type === "video") ? 1 : 0;

    showItem(0, false);
  });

/* ------------------ MOSTRA ELEMENTO ------------------ */
function showItem(index) {
  currentIndex = index;

  const item = gallery[index];
  const img = document.getElementById("big-image");
  const vid = document.getElementById("big-video");
  const muteBtn = document.getElementById("mute-btn");

  img.style.display = "none";
  vid.style.display = "none";
  muteBtn.style.display = "none";

  if (item.type === "image") {
    img.src = item.url;
    img.style.display = "block";
  } else {
    vid.src = item.url;
    vid.currentTime = 0;
    vid.muted = true;
    vid.play();
    vid.style.display = "block";
    muteBtn.style.display = "block";
  }

  document.getElementById("counter").textContent =
      `${index} / ${gallery.length - 1}`;
}

/* ------------------ NAVIGAZIONE ------------------ */
document.getElementById("prev-btn").onclick = () => {
  if (currentIndex > 0) showItem(--currentIndex);
};

document.getElementById("next-btn").onclick = () => {
  if (currentIndex < gallery.length - 1) showItem(++currentIndex);
};

/* ------------------ MUTE ------------------ */
document.getElementById("mute-btn").onclick = () => {
  const vid = document.getElementById("big-video");
  vid.muted = !vid.muted;
  document.getElementById("mute-btn").textContent = vid.muted ? "🔇" : "🔊";
};

/* ------------------ FULLSCREEN ------------------ */
document.getElementById("fullscreen-btn").onclick = () => {
  const elem = document.getElementById("big-gallery");
  if (!document.fullscreenElement) elem.requestFullscreen();
  else document.exitFullscreen();
};
</script>

</body>
</html>
